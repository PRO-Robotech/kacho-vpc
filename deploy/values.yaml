name: vpc
replicas: 1
image: kacho-vpc:dev
imagePullPolicy: IfNotPresent
ports:
  grpc: 9090
  internalGrpc: 9091
db:
  host: kacho-umbrella-pg-vpc
  port: "5432"
  user: vpc
  name: kacho_vpc
  passwordSecretName: kacho-umbrella-pg-vpc
  passwordSecretKey: password
resourceManagerAddr: "resource-manager.kacho.svc.cluster.local:9090"

# ─── Load-test friendly defaults (KAC-41) ─────────────────────────────
# Tuned for high-throughput Address.Create:
#   - DB_MAX_CONNS=200: pgxpool default of 4 caps write throughput.
#   - FOLDER_CACHE_TTL=30s: keeps folder existence checks out of
#     allocate hot-path.
#
# ⚠️ KACHO_VPC_DEFAULT_SG_INLINE намеренно НЕ переопределяется здесь:
# product-default — `true` (см. kacho-vpc/CLAUDE.md §9 / cmd/vpc/main.go).
# Network.Create должен inline-создавать default SG и привязывать его
# через `default_security_group_id`. KAC-40 чарт временно ставил `false`
# для +30-40% throughput на load-тесте — это сломало default SG в обычном
# UI-flow (KAC-54). Если нужен load-test override — задавать как ad-hoc
# `--set env.KACHO_VPC_DEFAULT_SG_INLINE=false`, не в product values.
env:
  KACHO_VPC_DB_MAX_CONNS: "200"
  KACHO_VPC_FOLDER_CACHE_TTL: "30s"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 2000m
    memory: 1Gi

# Default replicas=1; HPA autoscales up to 10 on CPU 70%.
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
