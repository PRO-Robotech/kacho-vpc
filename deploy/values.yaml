name: vpc
replicas: 1
image: kacho-vpc:dev
imagePullPolicy: IfNotPresent
ports:
  grpc: 9090
  internalGrpc: 9091
db:
  host: kacho-umbrella-pg-vpc
  port: "5432"
  user: vpc
  name: kacho_vpc
  passwordSecretName: kacho-umbrella-pg-vpc
  passwordSecretKey: password
iamAddr: "kacho-iam.kacho.svc.cluster.local:9090"

# ─── Config sections (KAC-95: viper YAML config) ──────────────────────
# Все ключи ниже рендерятся в /etc/kacho-vpc/config.yaml через
# deploy/templates/configmap.yaml. Любой ключ можно override через
# ENV KACHO_VPC_<SECTION>__<KEY>=... (см. internal/apps/kacho/config).
logger:
  level: INFO
apiServer:
  gracefulShutdown: 10s
metrics:
  enable: true
healthcheck:
  enable: true
repository:
  postgres:
    # ⚠️ Tuned for high-throughput Address.Create (KAC-41): pgxpool default
    # of 4 caps write throughput. 200 conns/pod уже unlock'aет 10k RPS.
    maxConns: 200
    sslMode: disable
authn:
  mode: dev
# KAC-119: per-RPC Check через kacho-iam.InternalIAMService.Check (port 9091).
# KAC-127 Phase 4: list-filter через kacho-iam.AuthorizeService.ListObjects (port 9090).
authz:
  iamEndpoint: ""           # default cluster-internal kacho-iam-internal:9091
  breakglass: false          # dev override — пропустить все Check
  checkTimeout: 2s
  cacheTtl: 5s
  denyRateLimitPerSec: 100
  # KAC-127 Phase 4 — FGA-filtered List handlers (acceptance §4.2).
  # Production: enabled=true и authorizeEndpoint указан явно. Dev / legacy: enabled=false →
  # use-case'ы возвращают unfiltered list (legacy behavior).
  listFilter:
    enabled: false           # Toggle FGA list-filter (production: true)
    authorizeEndpoint: ""    # Public AuthorizeService :9090 (fallback на iamEndpoint)
    authorizeTls:
      enable: false
    timeoutMs: 500           # Per-call FGA timeout (acceptance §4.3)
    cacheTtl: 5s             # LRU TTL (acceptance §4.4 D-2)
    maxEntries: 10000        # Cache hard cap (LRU eviction)
    maxResults: 10000        # FGA ListObjects result cap (acceptance §3 D-5)
    modelId: ""              # Pinned authorization_model_id (acceptance D-12)
    failOpen: false          # Default fail-closed (acceptance §3 D-6)
extapi:
  # KAC-106 (E1): renamed peer resourceManager -> iam (kacho-iam.ProjectService.Get).
  iam:
    tls:
      enable: false
    dnsLb: false
  compute:
    endpoint: "compute.kacho.svc.cluster.local:9090"
    tls:
      enable: false
watch:
  maxStreams: 32
network:
  # ⚠️ default-sg-inline=true (product default, см. kacho-vpc/CLAUDE.md §9):
  # Network.Create синхронно создаёт default SG. KAC-40 пробовал false для
  # +30-40% throughput на load-тесте — это сломало default SG в UI-flow (KAC-54).
  # Если нужен load-test override — `--set network.defaultSgInline=false`.
  defaultSgInline: true
  projectCache:
    positiveTtl: 30s
    negativeTtl: 5s
    maxSize: 10000

# ─── Legacy ENV-block (backward-compat) ───────────────────────────────
# Раньше тут жили все ENV-переменные. KAC-95 переехал config в YAML, но
# `env:` всё ещё уважается deployment.yaml — туда можно складывать
# overrides и debug-флаги (например, `KACHO_VPC_AUTH_MODE=production`)
# без правки configmap.
env: {}

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 2000m
    memory: 1Gi

# Default replicas=1; HPA autoscales up to 10 on CPU 70%.
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# ─── OPA Sidecar (KAC-127 Phase 4) ────────────────────────────────────
# OPA sidecar для guardrails. Bundle pulled from kacho-iam Internal :9091
# с signed JWS verification. Mirror pattern from kacho-iam Phase 3 (commit 68dc3b1).
#
# Decision-logs → stdout (collected by cluster log aggregator).
# Resource limits 256MB / 100m matching kacho-iam baseline.
opa:
  enabled: false                       # production: true
  image: "openpolicyagent/opa:0.62.0"
  imagePullPolicy: IfNotPresent
  port: 8181
  logLevel: info
  bundleSource:
    # kacho-iam Internal :9091 — OpaBundleService.
    url: "http://kacho-iam-internal.kacho.svc.cluster.local:9091"
    headers: {}                        # e.g. {Authorization: "Bearer <sa-token>"}
  bundlePolling:
    minDelaySeconds: 60
    maxDelaySeconds: 120
  bundleSigning:
    keyID: "kacho-iam-bundle-key-v1"
    algorithm: "RS256"
    # publicKey — PEM-encoded RSA public key (provided by kacho-iam admin).
    # В production загружается из Secret + mounted; placeholder здесь —
    # values-prod.yaml override обязателен.
    publicKey: |
      -----BEGIN PUBLIC KEY-----
      MIICIjANBgkqhkiG9w0BAQEFAAOCAg8AMIICCgKCAgEA<replace-with-real-key>
      -----END PUBLIC KEY-----
    excludeFiles:
      - ".manifest"
  decisionLogs:
    console: true                      # → stdout, scraped by cluster log agg
  statusLogs:
    console: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi
