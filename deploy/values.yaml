name: vpc
replicas: 1
image: kacho-vpc:dev
imagePullPolicy: IfNotPresent
ports:
  grpc: 9090
  internalGrpc: 9091
db:
  host: kacho-umbrella-pg-vpc
  port: "5432"
  user: vpc
  name: kacho_vpc
  passwordSecretName: kacho-umbrella-pg-vpc
  passwordSecretKey: password
iamAddr: "kacho-iam.kacho.svc.cluster.local:9090"

# ─── Config sections (KAC-95: viper YAML config) ──────────────────────
# Все ключи ниже рендерятся в /etc/kacho-vpc/config.yaml через
# deploy/templates/configmap.yaml. Любой ключ можно override через
# ENV KACHO_VPC_<SECTION>__<KEY>=... (см. internal/apps/kacho/config).
logger:
  level: INFO
apiServer:
  gracefulShutdown: 10s
metrics:
  enable: true
healthcheck:
  enable: true
repository:
  postgres:
    # ⚠️ Tuned for high-throughput Address.Create (KAC-41): pgxpool default
    # of 4 caps write throughput. 200 conns/pod уже unlock'aет 10k RPS.
    maxConns: 200
    sslMode: disable
authn:
  mode: dev
extapi:
  # KAC-106 (E1): renamed peer resourceManager -> iam (kacho-iam.ProjectService.Get).
  iam:
    tls:
      enable: false
    dnsLb: false
  compute:
    endpoint: "compute.kacho.svc.cluster.local:9090"
    tls:
      enable: false
watch:
  maxStreams: 32
network:
  # ⚠️ default-sg-inline=true (product default, см. kacho-vpc/CLAUDE.md §9):
  # Network.Create синхронно создаёт default SG. KAC-40 пробовал false для
  # +30-40% throughput на load-тесте — это сломало default SG в UI-flow (KAC-54).
  # Если нужен load-test override — `--set network.defaultSgInline=false`.
  defaultSgInline: true
  projectCache:
    positiveTtl: 30s
    negativeTtl: 5s
    maxSize: 10000

# ─── Legacy ENV-block (backward-compat) ───────────────────────────────
# Раньше тут жили все ENV-переменные. KAC-95 переехал config в YAML, но
# `env:` всё ещё уважается deployment.yaml — туда можно складывать
# overrides и debug-флаги (например, `KACHO_VPC_AUTH_MODE=production`)
# без правки configmap.
env: {}

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 2000m
    memory: 1Gi

# Default replicas=1; HPA autoscales up to 10 on CPU 70%.
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
