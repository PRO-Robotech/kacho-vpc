apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: kacho
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      initContainers:
        - name: migrate
          image: "{{ .Values.image }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["/usr/local/bin/kacho-vpc", "migrate", "up"]
          env:
            - name: KACHO_VPC_DB_HOST
              value: "{{ .Values.db.host }}"
            - name: KACHO_VPC_DB_PORT
              value: "{{ .Values.db.port }}"
            - name: KACHO_VPC_DB_USER
              value: "{{ .Values.db.user }}"
            - name: KACHO_VPC_DB_NAME
              value: "{{ .Values.db.name }}"
            - name: KACHO_VPC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.passwordSecretName }}
                  key: {{ .Values.db.passwordSecretKey }}
      containers:
        - name: {{ .Values.name }}
          image: "{{ .Values.image }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["/usr/local/bin/kacho-vpc", "serve"]
          ports:
            - name: grpc
              containerPort: {{ .Values.ports.grpc }}
            - name: grpc-internal
              containerPort: {{ .Values.ports.internalGrpc }}
          env:
            - name: KACHO_VPC_DB_HOST
              value: "{{ .Values.db.host }}"
            - name: KACHO_VPC_DB_PORT
              value: "{{ .Values.db.port }}"
            - name: KACHO_VPC_DB_USER
              value: "{{ .Values.db.user }}"
            - name: KACHO_VPC_DB_NAME
              value: "{{ .Values.db.name }}"
            - name: KACHO_VPC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.passwordSecretName }}
                  key: {{ .Values.db.passwordSecretKey }}
            - name: KACHO_VPC_GRPC_PORT
              value: "{{ .Values.ports.grpc }}"
            - name: KACHO_VPC_INTERNAL_PORT
              value: "{{ .Values.ports.internalGrpc }}"
            - name: KACHO_VPC_RESOURCE_MANAGER_GRPC_ADDR
              value: "{{ .Values.resourceManagerAddr }}"
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
