apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: kacho
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
      annotations:
        # ConfigMap-content hash → pod rolling-restart при изменении config.yaml.
        kacho.cloud/config-checksum: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      volumes:
        - name: config
          configMap:
            name: {{ .Values.name }}-config
      initContainers:
        # KAC-96 (skill evgeniy §9 K.1, AP-9): миграции БД исполняет отдельный
        # binary `kacho-migrator` (cobra-based CLI), не subcommand основного.
        # Тот же image — оба binary build'ятся в Dockerfile multi-stage. DSN
        # собирается мигратором из KACHO_VPC_DB_* env (через config-fallback
        # в cmd/migrator/main.go) — одно helm-values покрывает оба binary.
        - name: migrate
          image: "{{ .Values.image }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["/usr/local/bin/kacho-migrator", "up"]
          volumeMounts:
            - name: config
              mountPath: /etc/kacho-vpc
              readOnly: true
          env:
            - name: KACHO_VPC_CONFIG_PATH
              value: /etc/kacho-vpc/config.yaml
            - name: KACHO_VPC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.passwordSecretName }}
                  key: {{ .Values.db.passwordSecretKey }}
      containers:
        - name: {{ .Values.name }}
          image: "{{ .Values.image }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["/usr/local/bin/kacho-vpc", "serve"]
          ports:
            - name: grpc
              containerPort: {{ .Values.ports.grpc }}
            - name: grpc-internal
              containerPort: {{ .Values.ports.internalGrpc }}
          volumeMounts:
            - name: config
              mountPath: /etc/kacho-vpc
              readOnly: true
          env:
            - name: KACHO_VPC_CONFIG_PATH
              value: /etc/kacho-vpc/config.yaml
            - name: KACHO_VPC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.passwordSecretName }}
                  key: {{ .Values.db.passwordSecretKey }}
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
