name: newman-e2e (cross-repo)

# KAC-127 — cross-repo Newman E2E gate.
#
# The full Newman authz E2E suite (288-case default-deny matrix +
# 30-case ServiceAccount/API-token matrix) lives in kacho-deploy's
# `newman-e2e.yml`: it brings up a real kind + helm umbrella stack and runs
# the suites through the api-gateway REST endpoint. That workflow is only
# triggered by push/PR to the kacho-deploy repo itself.
#
# But the authz code those suites exercise lives HERE (kacho-vpc — the
# write-side FGA hierarchy-tuple emit on every Network/Subnet/... Create and
# the per-RPC Check authorization-gate). A PR to this repo that breaks the
# access matrix would otherwise pass CI (`ci.yaml` only runs the per-service
# unit/integration tests, never the cross-stack Newman authz matrix).
#
# This workflow closes that gap: on every PR / KAC-127 push it fires a
# `repository_dispatch` (event type `newman-e2e`) at PRO-Robotech/kacho-deploy
# with a `client_payload` naming this repo + branch, then polls the dispatched
# run and mirrors its conclusion — so a red authz matrix fails the PR here.
#
# Required secret: WORKFLOW_DISPATCH_TOKEN — a PAT (classic: scope `repo`;
# fine-grained: Actions=read/write + Contents=read on PRO-Robotech/kacho-deploy)
# able to POST `repos/PRO-Robotech/kacho-deploy/dispatches`. The default
# GITHUB_TOKEN cannot dispatch to another repo. See .github/workflows/README.md.

on:
  pull_request:
    branches: [main, KAC-127]
  push:
    branches: [KAC-127]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: newman-trigger-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_REPO: PRO-Robotech/kacho-deploy
  SOURCE_REPO: kacho-vpc
  EVENT_TYPE: newman-e2e
  WORKFLOW_FILE: newman-e2e.yml

jobs:
  trigger-newman:
    name: dispatch + await newman-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: resolve branch under test
        id: ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            ref="${HEAD_REF}"
          else
            ref="${GITHUB_REF#refs/heads/}"
          fi
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "branch under test: ${ref}"

      - name: guard — dispatch token present
        env:
          TOKEN: ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN}" ]; then
            echo "::error::secret WORKFLOW_DISPATCH_TOKEN is not set — cannot dispatch"
            echo "::error::see .github/workflows/README.md § cross-repo newman trigger"
            exit 1
          fi
          echo "dispatch token present"

      - name: dispatch newman-e2e in kacho-deploy
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}
          BRANCH_REF: ${{ steps.ref.outputs.ref }}
          COMMIT_SHA: ${{ github.sha }}
          SOURCE_RUN: ${{ github.repository }}#${{ github.run_id }}
        run: |
          set -euo pipefail
          # Record a UTC cutoff BEFORE dispatching so the poll step can
          # identify the run this dispatch created (repository_dispatch does
          # not return a run id).
          cutoff="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "cutoff=${cutoff}" >> "$GITHUB_OUTPUT"
          echo "dispatch cutoff (UTC): ${cutoff}"
          gh api "repos/${DEPLOY_REPO}/dispatches" \
            -f "event_type=${EVENT_TYPE}" \
            -f "client_payload[repo]=${SOURCE_REPO}" \
            -f "client_payload[ref]=${BRANCH_REF}" \
            -f "client_payload[sha]=${COMMIT_SHA}" \
            -f "client_payload[source]=${SOURCE_RUN}"
          echo "dispatched ${EVENT_TYPE} -> ${DEPLOY_REPO} (repo=${SOURCE_REPO} ref=${BRANCH_REF})"

      - name: locate dispatched run
        id: locate
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}
          CUTOFF: ${{ steps.dispatch.outputs.cutoff }}
        run: |
          set -euo pipefail
          run_id=""
          # GitHub needs a few seconds to register the dispatched run.
          for i in $(seq 1 30); do
            run_id="$(gh api \
              "repos/${DEPLOY_REPO}/actions/workflows/${WORKFLOW_FILE}/runs?event=repository_dispatch&per_page=20" \
              --jq "[.workflow_runs[] | select(.created_at >= \"${CUTOFF}\")] | sort_by(.created_at) | last | .id // empty")"
            if [ -n "${run_id}" ]; then
              echo "found newman-e2e run id: ${run_id}"
              break
            fi
            echo "waiting for dispatched run to register (${i}/30)..."
            sleep 10
          done
          if [ -z "${run_id}" ]; then
            echo "::error::could not locate the dispatched newman-e2e run in ${DEPLOY_REPO}"
            exit 1
          fi
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"
          echo "run_url=https://github.com/${DEPLOY_REPO}/actions/runs/${run_id}" >> "$GITHUB_OUTPUT"

      - name: await newman-e2e conclusion
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}
          RUN_ID: ${{ steps.locate.outputs.run_id }}
          RUN_URL: ${{ steps.locate.outputs.run_url }}
        run: |
          set -euo pipefail
          echo "tracking ${RUN_URL}"
          # Poll until the run completes. timeout-minutes on the job is the
          # hard cap; newman-e2e itself caps at ~50 min.
          for i in $(seq 1 180); do
            read -r status conclusion < <(gh api \
              "repos/${DEPLOY_REPO}/actions/runs/${RUN_ID}" \
              --jq '"\(.status) \(.conclusion // "null")"')
            echo "[$i] status=${status} conclusion=${conclusion}"
            if [ "${status}" = "completed" ]; then
              if [ "${conclusion}" = "success" ]; then
                echo "newman-e2e passed — ${RUN_URL}"
                exit 0
              fi
              echo "::error::newman-e2e concluded '${conclusion}' — ${RUN_URL}"
              exit 1
            fi
            sleep 20
          done
          echo "::error::timed out waiting for newman-e2e — ${RUN_URL}"
          exit 1
