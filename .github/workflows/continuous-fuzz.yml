name: continuous-fuzz

# KAC-127 Phase 12 — Continuous fuzzing for VPC.
# Targets: FuzzCIDRParse, FuzzPolicyParse.

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      fuzztime:
        description: 'Duration per target (e.g. 1h)'
        required: false
        default: '1h'

permissions:
  contents: read
  issues: write

defaults:
  run:
    working-directory: kacho-vpc

jobs:
  fuzz:
    name: fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        target:
          - FuzzCIDRParse
          - FuzzPolicyParse
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-vpc }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-corelib, ref: KAC-127, path: kacho-corelib }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-proto, ref: KAC-127, path: kacho-proto }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-vpc/go.mod }

      - name: restore fuzz corpus
        uses: actions/cache@v4
        with:
          path: kacho-vpc/internal/fuzz/testdata/fuzz/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: run fuzz
        env:
          FUZZTIME: ${{ inputs.fuzztime || '1h' }}
        run: |
          go test -run=^$ -fuzz=${{ matrix.target }} -fuzztime=${FUZZTIME} \
            ./internal/fuzz/ 2>&1 | tee fuzz-output.log

      - name: upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-failure-${{ matrix.target }}
          path: |
            kacho-vpc/internal/fuzz/testdata/fuzz/${{ matrix.target }}/
            kacho-vpc/fuzz-output.log
