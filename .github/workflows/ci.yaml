name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

# kacho-vpc — polyrepo: go.mod has `replace github.com/PRO-Robotech/kacho-{corelib,proto} => ../...`
# и Dockerfile'ы COPY ../kacho-corelib и т.п. → CI должен воспроизвести local layout
# (kacho-workspace/project/{kacho-vpc, kacho-corelib, ...}). actions/checkout не пускает
# path вне $GITHUB_WORKSPACE, поэтому: main-репо в подкаталог `kacho-vpc/`, siblings рядом
# (`kacho-corelib/`, `kacho-proto/`, ...), все `run:`-шаги в `working-directory: kacho-vpc`.
# Siblings чекаутятся с `ref: main` — все ранее незакрытые feature-PR (proto/corelib/
# resource-manager/api-gateway/deploy) уже смёржены в свои `main` (release v0.1.0 + kacho-vpc#7..#10).
# Если снова появится незакрытая кросс-репо зависимость — временно пиннить нужный sibling
# к его feature-ветке (`ref: feat/...`) и вернуть на `ref: main` после merge.

defaults:
  run:
    working-directory: kacho-vpc

jobs:
  build-vet-test:
    name: build + vet + test (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-vpc }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-corelib, ref: main, path: kacho-corelib }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-proto, ref: main, path: kacho-proto }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-vpc/go.mod, cache-dependency-path: kacho-vpc/go.sum }
      - run: go mod download
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -short -count=1 -timeout 5m ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-vpc }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-corelib, ref: main, path: kacho-corelib }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-proto, ref: main, path: kacho-proto }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-vpc/go.mod, cache-dependency-path: kacho-vpc/go.sum }
      - uses: golangci/golangci-lint-action@v9
        with:
          working-directory: kacho-vpc
          args: --timeout 5m

  govuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-vpc }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-corelib, ref: main, path: kacho-corelib }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-proto, ref: main, path: kacho-proto }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-vpc/go.mod, cache-dependency-path: kacho-vpc/go.sum }
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...
        continue-on-error: true   # informational пока не fail-on-vuln

  integration:
    name: integration (testcontainers Postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-vpc }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-corelib, ref: main, path: kacho-corelib }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-proto, ref: main, path: kacho-proto }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-vpc/go.mod, cache-dependency-path: kacho-vpc/go.sum }
      - run: go mod download
      # internal/repo/*integration_test.go поднимают postgres:16 через testcontainers
      # (Docker есть на ubuntu-latest runner'ах). Без -cover (covdata-инструменты в
      # отдельных toolchain-сборках бывают неполны; coverage здесь не нужен).
      - run: go test ./internal/repo/... -race -count=1 -timeout 300s

  newman:
    name: newman E2E (docker compose stack)
    # Поднимает compose-стек (pg-vpc + vpc + api-gateway + kacho-iam на host :28080),
    # сеет фикстуры, гоняет всю newman-сьюту. Образы :dev собираются из siblings (parent-context).
    # KAC-124: kacho-resource-manager retired — newman compose-stack нужно мигрировать
    # на kacho-iam (Account/Project). Пока stack не переписан, job выключен (if: false).
    # Follow-up: KAC-126 newman compose stack rewrite (rm → iam).
    runs-on: ubuntu-latest
    needs: [build-vet-test]
    if: ${{ false }}  # KAC-124 follow-up: stack ещё на retired kacho-resource-manager
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-vpc }
      # siblings: нужны как Go-deps (corelib/proto) и как Docker build-context
      # (Dockerfile'ы COPY ../kacho-corelib и т.п.; PROJECT_ROOT в kacho-deploy/Makefile = $(abspath ..))
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-corelib, ref: main, path: kacho-corelib }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-proto, ref: main, path: kacho-proto }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-resource-manager, ref: main, path: kacho-resource-manager }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-compute, ref: main, path: kacho-compute }   # kacho-deploy ci-up собирает kacho-compute:dev
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-api-gateway, ref: main, path: kacho-api-gateway }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-yc-shim, path: kacho-yc-shim }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-deploy, ref: main, path: kacho-deploy }

      - uses: actions/setup-node@v6
        with: { node-version: '20' }
      - run: npm install -g newman
        working-directory: .

      # Поднимает стек (pg-rm + pg-vpc + resource-manager + vpc + api-gateway на host :28080),
      # сеет фикстуры (Org/Cloud/Folder ids → ci/.seeded-ids.env, region ru-central1 + zones a..d,
      # default EXTERNAL_PUBLIC AddressPool). build context = $(abspath ..) = $GITHUB_WORKSPACE.
      # MANDATORY: дёшево (pure-Python, без сети) — hard-fail на дубль case-id и на кейс,
      # не зафиксированный в docs/CASES-INDEX.md (или не помеченный `# index: <ref>`).
      # Гоняется ДО тяжёлого ci-up/newman, чтобы не уникальный/не каталогизированный кейс
      # ронял CI рано. См. tests/newman/scripts/validate-cases.py, kacho-vpc/CLAUDE.md §14.3.
      - name: validate newman cases (uniqueness + CASES-INDEX coverage)
        run: python3 tests/newman/scripts/validate-cases.py
      - name: ci-up (build images + compose + seed)
        run: make -C ../kacho-deploy ci-up PROJECT_ROOT="$GITHUB_WORKSPACE"
      - run: python3 tests/newman/scripts/gen.py
      - name: run newman suites
        run: |
          set -a; . ../kacho-deploy/ci/.seeded-ids.env; set +a
          tests/newman/scripts/run.sh \
            --env-var baseUrl=http://localhost:28080 \
            --env-var existingOrgId="$existingOrgId" \
            --env-var existingCloudId="$existingCloudId" \
            --env-var existingFolderId="$existingFolderId" \
            --env-var existingFolderCrossId="$existingFolderCrossId" \
            --env-var existingZoneId="$existingZoneId" \
            --env-var existingZoneAltId="$existingZoneAltId"
      - name: dump stack logs on failure
        if: failure()
        run: make -C ../kacho-deploy ci-logs
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: newman-reports
          path: kacho-vpc/tests/newman/out/*.json
      # fail если в out/summary.txt колонка FAILED ($3) > 0
      - run: awk 'NR>1 && $3+0>0{f=1} END{exit f}' tests/newman/out/summary.txt
      - name: ci-down
        if: always()
        run: make -C ../kacho-deploy ci-down

  authz-deny-suite:
    name: authz-deny suite — generate + validate (KAC-122)
    runs-on: ubuntu-latest
    needs: [build-vet-test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - name: generate authz-deny collection
        run: python3 tests/newman/scripts/gen.py authz-deny
      - name: assert collection non-empty
        run: |
          test -s tests/newman/collections/authz-deny.postman_collection.json
          # must have at least 200 cases
          n=$(python3 -c "import json; print(len(json.load(open('tests/newman/collections/authz-deny.postman_collection.json'))['item']))")
          echo "authz-deny cases: $n"
          test "$n" -ge 200
      - uses: actions/upload-artifact@v7
        with:
          name: authz-deny-collection
          path: tests/newman/collections/authz-deny.postman_collection.json
