name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout kacho-corelib
        uses: actions/checkout@v4
        with:
          repository: PRO-Robotech/kacho-corelib
          path: ../kacho-corelib

      - name: Checkout kacho-proto
        uses: actions/checkout@v4
        with:
          repository: PRO-Robotech/kacho-proto
          path: ../kacho-proto

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download deps
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test (unit, short mode for CI without Docker)
        run: go test ./... -race -cover -short -timeout 120s
