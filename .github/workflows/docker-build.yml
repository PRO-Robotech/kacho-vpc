# docker-build — multi-arch DockerHub image build & push (KAC-127).
#
# Назначение: собирает Docker-образ kacho-vpc под linux/amd64 + linux/arm64 и
# пушит multi-arch manifest в DockerHub. Дополняет (НЕ заменяет) `ci.yaml`,
# который гоняет build/vet/test/lint/integration — этот workflow только
# собирает образы.
#
# Polyrepo: kacho-vpc — часть polyrepo (go.mod `replace ../kacho-corelib`,
# `../kacho-proto`; Dockerfile делает `COPY kacho-corelib` / `COPY kacho-proto`).
# Build context = workspace-каталог, в который чекаутятся main-репо + siblings.
#
# Образ: kacho-vpc (включает binary kacho-vpc serve + kacho-migrator).
#
# ─── Требуемые GitHub secrets ────────────────────────────────────────────
# DOCKERHUB_USERNAME — Docker Hub username (он же namespace для образов).
# DOCKERHUB_TOKEN    — Docker Hub access token (Read/Write/Delete scope).
# Установка (user-action; креды одинаковые на все kacho-* репо):
#   gh secret set DOCKERHUB_USERNAME --body "<value>" --repo PRO-Robotech/kacho-vpc
#   gh secret set DOCKERHUB_TOKEN    --body "<value>" --repo PRO-Robotech/kacho-vpc
#
# Tags: <branch>-<sha8> (combined multiarch), amd64-<branch>-<sha8>,
#       arm64-<branch>-<sha8> (per-arch промежуточные).

name: docker-build

on:
  push:
    branches:
      - main
      - "KAC-*"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

permissions:
  contents: read

env:
  IMAGE_NAME: kacho-vpc

jobs:
  docker-build-amd64:
    name: build amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: kacho-vpc }
      - uses: actions/checkout@v4
        with: { repository: PRO-Robotech/kacho-corelib, ref: main, path: kacho-corelib }
      - uses: actions/checkout@v4
        with: { repository: PRO-Robotech/kacho-proto, ref: main, path: kacho-proto }

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with: { length: 8 }

      - name: Create sanitized branch name
        id: sanitize
        run: echo "branch=$(echo "${GITHUB_REF_NAME}" | sed 's/\//-/g')" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Enable QEMU emulation
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Buildx cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-amd64-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-buildx-amd64-

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./kacho-vpc/Dockerfile
          push: true
          provenance: false
          platforms: linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:amd64-${{ steps.sanitize.outputs.branch }}-${{ steps.short-sha.outputs.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move new cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true

  docker-build-arm64:
    name: build arm64
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with: { path: kacho-vpc }
      - uses: actions/checkout@v4
        with: { repository: PRO-Robotech/kacho-corelib, ref: main, path: kacho-corelib }
      - uses: actions/checkout@v4
        with: { repository: PRO-Robotech/kacho-proto, ref: main, path: kacho-proto }

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with: { length: 8 }

      - name: Create sanitized branch name
        id: sanitize
        run: echo "branch=$(echo "${GITHUB_REF_NAME}" | sed 's/\//-/g')" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Enable QEMU emulation
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Buildx cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-arm64-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-buildx-arm64-

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./kacho-vpc/Dockerfile
          push: true
          provenance: false
          platforms: linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:arm64-${{ steps.sanitize.outputs.branch }}-${{ steps.short-sha.outputs.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move new cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true

  docker-multiarch-push:
    name: multiarch manifest push
    runs-on: ubuntu-latest
    needs: [docker-build-amd64, docker-build-arm64]
    steps:
      - uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with: { length: 8 }

      - name: Create sanitized branch name
        id: sanitize
        run: echo "branch=$(echo "${GITHUB_REF_NAME}" | sed 's/\//-/g')" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multiarch manifest
        run: |
          IMG="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          TAG="${{ steps.sanitize.outputs.branch }}-${{ steps.short-sha.outputs.sha }}"
          docker manifest create  "$IMG:$TAG" "$IMG:amd64-$TAG" "$IMG:arm64-$TAG"
          docker manifest annotate "$IMG:$TAG" "$IMG:amd64-$TAG" --arch amd64 --os linux
          docker manifest annotate "$IMG:$TAG" "$IMG:arm64-$TAG" --arch arm64 --os linux
          docker manifest push    "$IMG:$TAG"
