name: security-scan

# KAC-127 Phase 12 — Security scan gates for VPC: trivy + gosec + govulncheck.

on:
  push:
    branches: [main, KAC-*]
  pull_request:

permissions:
  contents: read
  security-events: write
  pull-requests: write

defaults:
  run:
    working-directory: kacho-vpc

jobs:
  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-vpc }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-corelib, ref: main, path: kacho-corelib }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-proto, ref: main, path: kacho-proto }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-vpc/go.mod }
      - run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          "$(go env GOPATH)/bin/gosec" -fmt sarif -out gosec.sarif ./... || true
          # gosec emits duplicate entries in rule properties.tags, which the
          # codeql SARIF validator rejects ("contains duplicate item"). Dedupe
          # every rule's tags, or substitute an empty schema-valid document.
          if jq -e . gosec.sarif >/dev/null 2>&1; then
            jq '(.runs[].tool.driver.rules[]?.properties.tags) |= (if . then unique else . end)' \
              gosec.sarif > gosec.sanitized.sarif && mv gosec.sanitized.sarif gosec.sarif
          else
            printf '%s' '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"gosec","rules":[]}},"results":[]}]}' > gosec.sarif
          fi
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: kacho-vpc/gosec.sarif, category: gosec }

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-vpc }
      - uses: aquasecurity/trivy-action@master  # KAC-127 — previous "0.30.0" failed (aquasec publishes only v-prefixed tags v0.28.0..v0.36.0; no plain "0.30.0" ref)
        with:
          scan-type: 'fs'
          scan-ref: 'kacho-vpc'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: trivy-fs.sarif, category: trivy-fs }

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-vpc }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-corelib, ref: main, path: kacho-corelib }
      - uses: actions/checkout@v6
        with: { repository: PRO-Robotech/kacho-proto, ref: main, path: kacho-proto }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-vpc/go.mod }
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" -mode=source -format=sarif ./... > govulncheck.sarif || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: kacho-vpc/govulncheck.sarif, category: govulncheck }
